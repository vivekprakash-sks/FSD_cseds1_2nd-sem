<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Grade Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }
        
        input {
            padding: 5px;
            margin: 5px;
        }
        
        button {
            padding: 5px 10px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <h2 align="center">Student Marks Calculator</h2>
    <div id="input-container">
        <label>Enter number of subjects: </label>
        <input type="number" id="numSubjects">
        <button onclick="generateInputs()">Set Subjects</button>
    </div>

    <div id="marks-entry" style="margin-top: 20px;"></div>
    <div id="result" style="margin-top: 20px; font-weight: bold;"></div>

    <script src="endtermpractical.js"></script>
</body>

</html>
